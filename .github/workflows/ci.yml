name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Authenticate to Docker Hub
        if: ${{ env.DOCKERHUB_USER != '' && env.DOCKERHUB_PAT != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_PAT }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Validate release metadata script
        run: bash scripts/test-calculate-docker-tags.sh

      - name: Validate GitHub Actions workflows
        uses: raven-actions/actionlint@v2

      - name: Run NUKE pipeline
        run: bash build.sh Test TestEndToEnd

      - name: Create coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: artifacts/test-coverage/coverage.cobertura.merged.xml
          format: markdown
          output: both
          badge: true
          thresholds: '60 85'

      - name: Add coverage to job summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Add coverage PR comment
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.actor != 'dependabot[bot]'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: code-coverage
          path: code-coverage-results.md

  installer-tests-unix:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bats
        id: setup-bats
        uses: bats-core/bats-action@4.0.0
        with:
          bats-version: 1.12.0
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false

      - name: Run installer tests
        run: bats tests/install.bats

  installer-tests-windows:
    strategy:
      matrix:
        shell: [ powershell, pwsh ]
    runs-on: windows-latest
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Pester
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12
          Install-Module Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run installer tests
        run: |
          Import-Module Pester -RequiredVersion 5.7.1 -Force
          Invoke-Pester -Path tests/install.Tests.ps1 -CI
