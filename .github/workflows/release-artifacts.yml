name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to stamp into the artifacts.
        type: string
        required: false
        default: 0.1.0-dev
  workflow_call:
    inputs:
      version:
        description: Semantic version to stamp into the artifacts.
        type: string
        required: true

jobs:
  publish-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish API
        run: bash build.sh PublishApi --release-version "${{ inputs.version }}"

      - name: Upload API artifact
        uses: actions/upload-artifact@v5
        with:
          name: shadowdrop-api
          path: artifacts/publish/api/
          if-no-files-found: error

  publish-cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Native AOT cross-linker prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            zlib1g-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish Linux CLI
        run: bash build.sh PublishCliLinux --release-version "${{ inputs.version }}"

      - name: Upload Linux CLI artifacts
        uses: actions/upload-artifact@v5
        with:
          name: shadowdrop-cli-linux
          path: artifacts/publish/cli/*/shadowdrop-cli-*-linux-*
          if-no-files-found: error

  publish-cli-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish macOS CLI
        run: bash build.sh PublishCliMacOs --release-version "${{ inputs.version }}"

      - name: Upload macOS CLI artifacts
        uses: actions/upload-artifact@v5
        with:
          name: shadowdrop-cli-macos
          path: artifacts/publish/cli/*/shadowdrop-cli-*-osx-*
          if-no-files-found: error

  publish-cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish Windows CLI
        run: ./build.cmd PublishCliWindows --release-version "${{ inputs.version }}"

      - name: Upload Windows CLI artifacts
        uses: actions/upload-artifact@v5
        with:
          name: shadowdrop-cli-windows
          path: artifacts/publish/cli/*/shadowdrop-cli-*-win-*.exe
          if-no-files-found: error

  collect-release-artifacts:
    runs-on: ubuntu-latest
    needs:
      - publish-api
      - publish-cli-linux
      - publish-cli-macos
      - publish-cli-windows
    steps:
      - name: Download published artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/downloaded

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/release/api artifacts/release/cli
          cp -R artifacts/downloaded/shadowdrop-api/. artifacts/release/api/
          find artifacts/downloaded -type f -name 'shadowdrop-cli-*' -exec cp {} artifacts/release/cli/ \;

          expected_count=6
          actual_count="$(find artifacts/release/cli -maxdepth 1 -type f -name 'shadowdrop-cli-*' | wc -l)"
          if [ "$actual_count" -ne "$expected_count" ]; then
            echo "Expected $expected_count CLI artifacts but found $actual_count."
            find artifacts/release/cli -maxdepth 1 -type f -name 'shadowdrop-cli-*' -print
            exit 1
          fi

          (
            cd artifacts/release/cli
            sha256sum shadowdrop-cli-* > CHECKSUMS.sha256
          )

      - name: Upload complete release artifact bundle
        uses: actions/upload-artifact@v5
        with:
          name: shadowdrop-release-artifacts
          path: artifacts/release/
          if-no-files-found: error
